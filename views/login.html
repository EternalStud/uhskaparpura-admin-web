<main class="login-page">
    <section class="login-panel" aria-labelledby="login-title">
        <div class="login-brand">
            <div class="brand-mark" aria-hidden="true">
                <span class="material-symbols-rounded">school</span>
            </div>
            <h1 id="login-title">UHS KAPARPURA Admin portal</h1>
            <p>Secure examination administration for student records, marks entry, and result generation.</p>
        </div>
        <div class="login-card">
            <div>
                <h2>Sign in</h2>
                <p>Use your authorized Google account to continue.</p>
            </div>
            <div id="google-login-button" class="google-button-slot"></div>
            <div id="dev-login-container" style="display: none; margin-top: 16px; border-top: 1px dashed var(--color-border); padding-top: 16px;">
                <button type="button" id="dev-login-btn" class="btn btn-secondary" style="width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px; font-weight: 700; padding: 10px; font-size: 0.88rem; border-radius: var(--radius-md);">
                    <span class="material-symbols-rounded" style="font-size: 1.1rem;">developer_mode</span> Sign in as Admin (Local Dev)
                </button>
            </div>
            <div id="login-warning" class="login-warning" role="status"></div>
        </div>
    </section>
</main>
