<div class="prepare-exam-container">
    <form id="prepare-exam-form" class="prepare-exam-form" novalidate>
        <label class="form-field" for="academic-year">
            <span>Academic Year</span>
            <select id="academic-year" name="academicYear" required></select>
        </label>

        <label class="form-field" for="spreadsheet-name">
            <span>Spreadsheet Name</span>
            <input id="spreadsheet-name" name="spreadsheet" type="text" placeholder="Test Result 2026-27" autocomplete="off" required>
        </label>

        <label class="form-field" for="exam-type">
            <span>Exam Type</span>
            <select id="exam-type" name="examType" required>
                <option value="">Select exam type</option>
                <option value="त्रैमासिक परीक्षा">त्रैमासिक परीक्षा</option>
                <option value="अर्धवार्षिक परीक्षा">अर्धवार्षिक परीक्षा</option>
                <option value="वार्षिक परीक्षा">वार्षिक परीक्षा</option>
                <option value="सेंट-अप परीक्षा">सेंट-अप परीक्षा</option>
                <option value="Pre Board">Pre Board</option>
            </select>
        </label>

        <fieldset class="checkbox-group">
            <legend>Classes</legend>
            <label>
                <input type="checkbox" name="classes" value="9" checked>
                <span>Class 9</span>
            </label>
            <label>
                <input type="checkbox" name="classes" value="10" checked>
                <span>Class 10</span>
            </label>
            <label>
                <input type="checkbox" name="classes" value="11" checked>
                <span>Class 11</span>
            </label>
            <label>
                <input type="checkbox" name="classes" value="12" checked>
                <span>Class 12</span>
            </label>
        </fieldset>

        <p id="prepare-exam-error" class="form-error" role="alert"></p>

        <footer class="modal-actions">
            <button class="btn btn-ghost" type="button" data-modal-cancel>Cancel</button>
            <button class="btn btn-primary" type="submit">
                <span class="material-symbols-rounded" aria-hidden="true">assignment</span>
                Prepare Exam
            </button>
        </footer>
    </form>

    <div id="prepare-exam-success" class="prepare-exam-success" hidden>
        <div class="success-header">
            <span class="material-symbols-rounded success-icon">task_alt</span>
            <h3>Sheets Prepared Successfully</h3>
            <p>Google Sheets generated in exact BSEB format and shared with your account.</p>
        </div>
        <div class="success-body">
            <ul id="prepared-sheets-links" class="prepared-sheets-list"></ul>
        </div>
        <footer class="modal-actions">
            <button class="btn btn-ghost" type="button" data-modal-close>Close</button>
            <a id="open-sheet-btn" class="btn btn-primary" href="#" target="_blank" rel="noopener noreferrer">
                <span class="material-symbols-rounded" aria-hidden="true">open_in_new</span>
                Open Google Sheet
            </a>
        </footer>
    </div>
</div>
