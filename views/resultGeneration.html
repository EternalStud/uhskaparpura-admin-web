<div class="dashboard-layout">
    <header id="navbar-result-generation"></header>
    
    <main class="dashboard-main subject-tag-main">
        <div class="subject-tag-container">
            <!-- Breadcrumbs -->
            <nav class="breadcrumb-nav" aria-label="Breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a href="#/dashboard">Dashboard</a></li>
                    <li class="breadcrumb-item active" aria-current="page">Result Generation</li>
                </ol>
            </nav>

            <!-- Page Header -->
            <header class="subject-tag-header">
                <div class="subject-tag-title-area">
                    <a href="#/dashboard" class="btn btn-icon btn-ghost" aria-label="Go back to Dashboard" style="border: 1px solid var(--color-border); border-radius: 50%; width: 40px; height: 40px; display: inline-flex; align-items: center; justify-content: center; text-decoration: none; color: var(--color-text);">
                        <span class="material-symbols-rounded" aria-hidden="true" style="font-size: 1.5rem;">arrow_back</span>
                    </a>
                    <div>
                        <h1>Result Generation</h1>
                        <p class="subtitle">Compile and export class-wise student results.</p>
                    </div>
                </div>
            </header>

            <!-- Filters Area -->
            <section class="filters-card" aria-label="Filters">
                <div class="filters-toolbar">
                    <label class="filter-field" for="filter-academic-year">
                        <span class="filter-label">Academic Year</span>
                        <select id="filter-academic-year" name="academicYear" required></select>
                    </label>

                    <label class="filter-field" for="filter-exam">
                        <span class="filter-label">Exam Name</span>
                        <select id="filter-exam" name="examName" required>
                            <option value="">Select Exam</option>
                        </select>
                    </label>

                    <div class="filter-field">
                        <span class="filter-label">Classes</span>
                        <div class="class-checkboxes" style="display: flex; gap: 16px; align-items: center; height: 44px; padding: 0 12px; border: 1px solid var(--color-border); border-radius: var(--radius-md); background: var(--color-surface);">
                            <label style="display: flex; align-items: center; gap: 6px; cursor: pointer; font-size: 0.9rem; font-weight: 500; color: var(--color-text);">
                                <input type="checkbox" name="classes" value="9" style="width: 16px; height: 16px; accent-color: var(--color-primary);" checked> 9
                            </label>
                            <label style="display: flex; align-items: center; gap: 6px; cursor: pointer; font-size: 0.9rem; font-weight: 500; color: var(--color-text);">
                                <input type="checkbox" name="classes" value="10" style="width: 16px; height: 16px; accent-color: var(--color-primary);"> 10
                            </label>
                            <label style="display: flex; align-items: center; gap: 6px; cursor: pointer; font-size: 0.9rem; font-weight: 500; color: var(--color-text);">
                                <input type="checkbox" name="classes" value="11" style="width: 16px; height: 16px; accent-color: var(--color-primary);"> 11
                            </label>
                            <label style="display: flex; align-items: center; gap: 6px; cursor: pointer; font-size: 0.9rem; font-weight: 500; color: var(--color-text);">
                                <input type="checkbox" name="classes" value="12" style="width: 16px; height: 16px; accent-color: var(--color-primary);"> 12
                            </label>
                        </div>
                    </div>

                    <div id="stream-filter-container" class="filter-field" style="display: none;">
                        <span class="filter-label">Stream</span>
                        <select id="filter-stream" name="stream">
                            <option value="">ALL</option>
                            <option value="Science">Science</option>
                            <option value="Arts">Arts</option>
                        </select>
                    </div>

                    <label class="filter-field" for="filter-section">
                        <span class="filter-label">Section</span>
                        <select id="filter-section" name="section" required>
                            <option value="">Select Section</option>
                        </select>
                    </label>

                    <button id="generate-results-btn" class="btn btn-primary btn-load" type="button">
                        <span class="material-symbols-rounded" aria-hidden="true">settings</span>
                        Generate Results
                    </button>
                </div>
            </section>

            <!-- Results Output Area -->
            <section class="workspace-card" id="results-output-card" style="display: none; padding: 24px; margin-top: 16px;">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid var(--color-border); padding-bottom: 16px;">
                    <div>
                        <h2 style="font-size: 1.3rem; font-weight: 800; margin: 0; color: var(--color-text);">Compiled Examination Results</h2>
                        <p style="font-size: 0.88rem; color: var(--color-muted); margin: 2px 0 0 0;">View student grades, totals, divisions, and ranks directly.</p>
                    </div>
                </div>

                <!-- Class Tabs Selector -->
                <div id="results-tabs-container" style="display: flex; border-bottom: 1px solid var(--color-border); gap: 8px; overflow-x: auto; padding-bottom: 1px; margin-bottom: 20px;">
                    <!-- Dynamically populated -->
                </div>

                <!-- Toolbar (Search & info) -->
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; gap: 16px; flex-wrap: wrap;">
                    <div style="display: flex; align-items: center; gap: 12px;">
                        <input type="text" id="result-search-input" placeholder="Search student by name or roll..." style="padding: 8px 12px; font-size: 0.88rem; border: 1px solid var(--color-border); border-radius: var(--radius-sm); width: 260px;">
                        <select id="result-sort-select" style="padding: 8px 12px; font-size: 0.88rem; border: 1px solid var(--color-border); border-radius: var(--radius-sm); background: #ffffff; cursor: pointer; color: var(--color-text);">
                            <option value="roll">Sort by Roll Number</option>
                            <option value="aggregate">Sort by Aggregate (Highest First)</option>
                        </select>
                    </div>
                    <div style="display: flex; align-items: center; gap: 12px;">
                        <span class="status-pill" style="font-weight: 600; padding: 8px 12px;" id="result-stats-summary">
                            0 Students Listed
                        </span>
                        <button id="export-excel-btn" class="btn btn-secondary" style="display: flex; align-items: center; gap: 6px; padding: 8px 14px; font-size: 0.88rem; border-radius: var(--radius-sm); background: var(--color-success); border-color: var(--color-success); color: white; font-weight: 600;">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 2px;">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                                <polyline points="7 10 12 15 17 10"/>
                                <line x1="12" y1="15" x2="12" y2="3"/>
                            </svg>
                            Export to Excel
                        </button>
                    </div>
                </div>

                <!-- Live Results Table Container -->
                <div style="border: 1px solid var(--color-border); border-radius: var(--radius-lg); overflow: hidden; background: #ffffff;">
                    <div style="max-height: 680px; overflow-y: auto; overflow-x: auto;">
                        <table class="data-table" style="width: 100%; border-collapse: collapse; text-align: left; font-size: 0.9rem;">
                            <thead id="results-table-thead" style="background: var(--color-background); border-bottom: 2px solid var(--color-border); position: sticky; top: 0; z-index: 100;">
                                <!-- Dynamic Headers -->
                            </thead>
                            <tbody id="results-table-tbody">
                                <!-- Dynamic Rows -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </section>
        </div>
    </main>
</div>
