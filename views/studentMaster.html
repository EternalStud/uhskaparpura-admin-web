<div class="dashboard-layout">
    <header id="navbar-student-master"></header>
    
    <main class="dashboard-main subject-tag-main">
        <div class="subject-tag-container">
            <!-- Breadcrumbs -->
            <nav class="breadcrumb-nav" aria-label="Breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a href="#/dashboard">Dashboard</a></li>
                    <li class="breadcrumb-item active" aria-current="page">Student Master</li>
                </ol>
            </nav>

            <!-- Page Header -->
            <header class="subject-tag-header">
                <div class="subject-tag-title-area">
                    <a href="#/dashboard" class="btn btn-icon btn-ghost" aria-label="Go back to Dashboard" style="border: 1px solid var(--color-border); border-radius: 50%; width: 40px; height: 40px; display: inline-flex; align-items: center; justify-content: center; text-decoration: none; color: var(--color-text);">
                        <span class="material-symbols-rounded" aria-hidden="true" style="font-size: 1.5rem;">arrow_back</span>
                    </a>
                    <div>
                        <h1>Student Master</h1>
                        <p class="subtitle">Search and manage general student registration records.</p>
                    </div>
                </div>
            </header>

            <!-- Search and Filter Toolbar -->
            <section class="filters-card" aria-label="Filters">
                <div class="filters-toolbar" style="gap: 16px;">
                    <label class="filter-field" for="filter-academic-year">
                        <span class="filter-label">Academic Year</span>
                        <select id="filter-academic-year" name="academicYear" required style="height: 44px;"></select>
                    </label>

                    <label class="filter-field" for="filter-class">
                        <span class="filter-label">Filter by Class</span>
                        <select id="filter-class" name="class">
                            <option value="">All Classes</option>
                            <option value="9">Class 9</option>
                            <option value="10">Class 10</option>
                            <option value="11">Class 11</option>
                            <option value="12">Class 12</option>
                        </select>
                    </label>

                    <label class="filter-field" for="search-name" style="flex: 2;">
                        <span class="filter-label">Search by Name</span>
                        <div style="position: relative;">
                            <span class="material-symbols-rounded" style="position: absolute; left: 12px; top: 11px; font-size: 1.25rem; color: var(--color-muted);">search</span>
                            <input id="search-name" type="text" autocomplete="off" placeholder="Type student name..." style="padding-left: 38px; height: 44px;">
                        </div>
                    </label>

                    <label class="filter-field" for="search-roll">
                        <span class="filter-label">Search by Roll No.</span>
                        <div style="position: relative;">
                            <span class="material-symbols-rounded" style="position: absolute; left: 12px; top: 11px; font-size: 1.25rem; color: var(--color-muted);">pin</span>
                            <input id="search-roll" type="text" autocomplete="off" placeholder="e.g. 15" style="padding-left: 38px; height: 44px;">
                        </div>
                    </label>

                    <button id="btn-go" class="btn btn-primary btn-load" type="button" style="height: 44px;">
                        <span class="material-symbols-rounded" aria-hidden="true">arrow_forward</span>
                        Go
                    </button>
                </div>
            </section>

            <!-- Class-wise Statistics Panel -->
            <section class="workspace-card" id="stats-panel" style="display: none; padding: 20px; margin-bottom: 16px; border: 1px solid var(--color-border); background: #ffffff;">
                <h3 style="font-size: 1rem; font-weight: 700; margin: 0 0 16px 0; color: var(--color-text); display: flex; align-items: center; gap: 8px;">
                    <span class="material-symbols-rounded" style="color: var(--color-primary);">analytics</span>
                    Enrollment Statistics Summary
                </h3>
                
                <div id="stats-grid-container" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px;">
                    <!-- Stats cards dynamically generated -->
                </div>
            </section>

            <!-- Stats tracker -->
            <div style="display: flex; justify-content: space-between; align-items: center; padding: 4px 0;">
                <div class="stats-summary-text">
                    Total Records: <strong id="student-count">0</strong>
                </div>
            </div>

            <!-- Table Workspace -->
            <section class="workspace-card">
                <!-- Skeleton Loader -->
                <div id="skeleton-loader" class="skeleton-container" style="display: none;">
                    <div class="skeleton-row header"></div>
                    <div class="skeleton-row"></div>
                    <div class="skeleton-row"></div>
                    <div class="skeleton-row"></div>
                    <div class="skeleton-row"></div>
                </div>

                <!-- Desktop Table Grid -->
                <div class="desktop-workspace-container" id="student-table-container">
                    <table class="workspace-table">
                        <thead>
                          <tr>
                            <th class="col-center" style="width: 80px;">Roll No</th>
                            <th style="min-width: 180px;">Student Name</th>
                            <th style="min-width: 150px;">Father's Name</th>
                            <th style="min-width: 150px;">Mother's Name</th>
                            <th style="min-width: 120px;">Mobile No.</th>
                            <th style="min-width: 180px;">Address</th>
                            <th class="col-center" style="width: 80px;">Class</th>
                            <th class="col-center" style="width: 80px;">Section</th>
                            <th style="min-width: 100px;">Stream</th>
                          </tr>
                        </thead>
                        <tbody id="student-tbody">
                          <!-- Filled dynamically -->
                        </tbody>
                    </table>
                </div>

                <!-- Mobile Cards Workspace -->
                <div id="mobile-workspace" class="mobile-workspace-container" style="display: none;">
                    <!-- Cards dynamically populated -->
                </div>
            </section>
        </div>
    </main>
</div>
